<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>近期活動 - 資訊工程科 科學會 | 國立臺中科技大學</title>
    <meta name="description" content="國立臺中科技大學 資訊工程科 科學會近期活動資訊。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <span class="logo-text">NTCUST <span class="highlight">CSIE</span></span>
                <img src="./img/logo.png" alt="NTCUST CSIE Logo" class="nav-logo">
                <span class="logo-subtext">國立臺中科技大學 資訊工程科 科學會</span>
            </a>
            <div class="hamburger">
                <i class="ph-bold ph-list"></i>
            </div>
            <ul class="nav-links">
                <li><a href="/#about">關於我們</a></li>
                <li><a href="members.html">科會成員</a></li>
                <li><a href="events.html">近期活動</a></li>
                <li><a href="finance.html" class="active">財務報表</a></li>
                <li><a href="feedback.html">意見箱</a></li>
                <li><a href="/#contact">聯絡資訊</a></li>
                <li>
                    <button class="theme-toggle" aria-label="切換深色/淺色模式">
                        <i class="ph-fill ph-moon"></i>
                        <i class="ph-fill ph-sun"></i>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Header Padding since no hero section here -->
    <div style="height: 100px;"></div>

    <main>
        <section id="events" class="events-section">
            <div class="container">
                <h2 class="section-title">近期活動 <span class="highlight">Events</span></h2>
                <div class="events-grid" id="events-container">
                    <!-- Events will be populated by events.js -->
                </div>
            </div>
        </section>
    </main> 

    <!-- Event Modal -->
    <div id="eventModal" class="modal-overlay">
        <div class="modal-card event-modal-card glass-card">
            <button class="modal-close"><i class="ph-bold ph-x"></i></button>
            <div class="event-modal-grid">
                <div class="event-modal-image-container">
                    <img id="eventModalImage" src="" alt="活動圖片">
                </div>
                <div class="event-modal-left">
                    <h3 id="eventModalTitle">活動標題</h3>
                    <p id="eventModalDesc">活動介紹...</p>
                </div>
                <div class="event-modal-right">
                    <h4>相關連結</h4>
                    <ul id="eventModalLinks" class="past-events-list">
                        <!-- Links populated by JS -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 國立臺中科技大學<br>資訊工程科 科學會</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/events.js"></script>
</body>
</html>
