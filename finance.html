    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">

    <!-- Header Padding since no hero section here -->
    <div style="height: 100px;"></div>

    <main>
        <section id="finance" class="finance-section">
            <div class="container">
                <h2 class="section-title">財務報表 <span class="highlight">Finance</span></h2>
                
                <div class="finance-tabs-wrapper">
                    <div class="finance-tabs" id="finance-tabs">
                        <button class="finance-tab active" data-target="116-1">116學年度上學期</button>
                        <button class="finance-tab" data-target="116-2">116學年度下學期</button>
                        <a href="https://drive.google.com/drive/folders/1HmuAC7US5h5TlW69jyF5_AyKgMIkrXcK?usp=sharing" class="finance-tab">財務資料</a>
                    </div>
                </div>

                <div class="glass-card finance-card">

                    <div class="finance-header">
                        <h3 id="finance-title" class="finance-title"></h3>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="finance-table">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>摘要</th>
                                    <th class="amount-col income">收入 (NT$)</th>
                                    <th class="amount-col expense">支出 (NT$)</th>
                                    <th class="amount-col balance">結餘 (NT$)</th>
                                </tr>
                            </thead>
                            <tbody id="finance-table-body">
                                <!-- 財務報表資料由 script.js 動態渲染 -->
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="finance-footer">
                        <p class="finance-note">※ 本報表經由系學會財務長編製，並由監查委員審核通過。所有開銷皆有發票收據留存備查。</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
